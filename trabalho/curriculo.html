<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Currículo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="curriculo" id="curriculo"></div>

<button onclick="window.print()">Imprimir</button>

<script>
const dados = JSON.parse(localStorage.getItem("curriculo"));

if (dados) {
    document.getElementById("curriculo").innerHTML = `
        <h1>${dados.nome}</h1>
        <p><strong>Email:</strong> ${dados.email}</p>
        <p><strong>Telefone:</strong> ${dados.telefone}</p>

        <h2>Formação</h2>
<ul>
    ${dados.formacoes.map(f => `<li>${f}</li>`).join("")}
</ul>

        <h2>Cursos</h2>
        <p>${dados.cursos}</p>

        <h2>Experiência Profissional</h2>
        <p>${dados.experiencia}</p>
    `;
} else {
    document.getElementById("curriculo").innerHTML = "<p>Nenhum dado encontrado.</p>";
}
</script>

</body>
</html>
