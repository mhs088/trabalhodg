<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Currículo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

    
<h1>PREENCHA SEU CURRICULO</h1>

<form id="curriculoForm">

    <div id="perguntas">
<h2>Dados Pessoais</h2>
<input type="text" id="nome" placeholder="Nome completo" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="telefone" placeholder="Telefone" required>

<h2>Formação</h2>

<div id="formacoes-container">
    <div class="formacao-item">
        <textarea placeholder="Sua formação acadêmica" required></textarea>
        <button type="button" class="btn-remover" onclick="removerFormacao(this)">−</button>
    </div>
</div>

<div class="btn-add-container">
    <button type="button" class="btn-adicionar" onclick="adicionarFormacao()">+</button>
</div>


<h2>Cursos</h2>
<textarea id="cursos" placeholder="Cursos complementares"></textarea>

<h2>Experiência Profissional</h2>
<textarea id="experiencia" placeholder="Experiências profissionais" required></textarea>
</div>
<p></p>
<center>
<button type="submit">Gerar Currículo</button>
</center>
</form>


<script src="script.js"></script>

</body>
</html>
